<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>需求与问题 - App Privacy</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="index.html" class="site-logo">App Privacy</a>
      <nav class="site-nav">
        <a href="index.html">隐私政策</a>
        <a href="requests.html" class="active">需求与问题</a>
      </nav>
    </div>
  </header>

  <main>
    <h1>需求与问题</h1>

    <div class="form-card">
      <p class="form-intro">欢迎提交对软件的功能需求或使用中的问题。</p>

      <div id="form-message" class="form-message" hidden></div>

      <form id="request-form" novalidate>
        <div class="form-group">
          <label for="type">类型</label>
          <select id="type" name="type" required>
            <option value="">请选择类型</option>
            <option value="feature_request">功能需求</option>
            <option value="bug_report">Bug 反馈</option>
            <option value="question">问题咨询</option>
            <option value="other">其他</option>
          </select>
        </div>

        <div class="form-group">
          <label for="title">标题</label>
          <input type="text" id="title" name="title" placeholder="简要概括您的需求或问题" required maxlength="200">
        </div>

        <div class="form-group">
          <label for="content">详细描述</label>
          <textarea id="content" name="content" placeholder="请详细描述功能需求、复现步骤或问题背景" required maxlength="5000"></textarea>
        </div>

        <div class="form-group">
          <label for="email">联系邮箱（选填）</label>
          <input type="email" id="email" name="email" placeholder="如需回复，请留下邮箱">
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">提交</button>
      </form>
    </div>

    <h2 class="section-title">用户 Requests</h2>
    <p id="requests-empty" class="empty-hint" hidden>暂无记录，提交第一条需求或问题吧。</p>
    <div id="requests-list" class="requests-list"></div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 App Privacy. All rights reserved.</p>
  </footer>

  <script src="js/requests.js"></script>
</body>
</html>
